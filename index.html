<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Garimpo de Videogames — Duilio</title>
  <meta name="description" content="Anúncios de videogames particulares em Sorocaba, Votorantim e Araçoiaba da Serra.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Garimpo de Videogames — Duilio">
  <meta property="og:description" content="PS2 ao PS5, Xbox One S e Series S — só particular, Sorocaba e região.">
  <meta property="og:image" content="__ZAPIA_SITE_ORIGIN__/_z/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="__ZAPIA_SITE_ORIGIN__/_z/og.png">
  <link rel="manifest" href="__ZAPIA_SITE_URL__/manifest.webmanifest">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Garimpo Games">
  <link rel="apple-touch-icon" href="__ZAPIA_SITE_URL__/apple-touch-icon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f3f4f6;
      color: #111;
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      background: #1d4ed8;
      color: white;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header p  { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }

    .aviso {
      background: #eff6ff;
      border: 1px solid #93c5fd;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: #1e40af;
      margin-bottom: 20px;
    }

    input[type="checkbox"] { display: none; }

    .item-wrap {
      border: 2px solid #111;
      border-radius: 14px;
      margin-bottom: 18px;
      overflow: hidden;
      background: white;
    }

    .card {
      background: white;
      border-radius: 0;
      margin-bottom: 0;
      border: none;
      overflow: hidden;
      transition: opacity 0.3s, background 0.3s;
    }

    .item-wrap:has(input.cb-visto:checked) {
      border-color: #f87171;
      background: #fee2e2;
    }
    .item-wrap:has(input.cb-visto:checked) .card {
      background: #fee2e2;
      opacity: 0.6;
    }
    .item-wrap:has(input.cb-visto:checked) .card .card-body {
      text-decoration: line-through;
      color: #b91c1c;
    }
    .item-wrap:has(input.cb-visto:checked) .card label.btn-visto {
      background: #dc2626;
      color: white;
    }
    .item-wrap:has(input.cb-visto:checked) .card label.btn-visto::before {
      content: "✓ Visto";
    }

    .item-wrap:has(input.cb-quente:checked) .card {
      border-color: #dc2626;
      box-shadow: 0 0 0 2px #fca5a5;
    }
    .item-wrap:has(input.cb-quente:checked) .card .card-header {
      background: #fee2e2;
    }
    .item-wrap:has(input.cb-quente:checked) .card label.btn-quente {
      background: #dc2626;
      color: white;
    }
    .item-wrap:has(input.cb-quente:checked) .card label.btn-quente::before {
      content: "🔥 Quente!";
    }

    .card-header {
      background: #eff6ff;
      padding: 10px 14px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .modelo { font-weight: 700; font-size: 0.95rem; color: #111; }
    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-ps5  { background: #1d4ed8; color: white; }
    .badge-ps4  { background: #7c3aed; color: white; }
    .badge-ps3  { background: #dc2626; color: white; }
    .badge-ps2  { background: #059669; color: white; }
    .badge-xbox { background: #047857; color: white; }

    .card-body {
      padding: 10px 14px;
      font-size: 0.85rem;
      line-height: 1.6;
      color: #374151;
    }
    .card-body .preco  { font-size: 1rem; font-weight: 700; color: #111; }
    .card-body .desc   { font-size: 0.82rem; color: #4b5563; font-style: italic; margin-top: 2px; }
    .card-body .cidade { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }

    .card-footer {
      padding: 8px 14px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-link {
      display: inline-block;
      background: #1d4ed8;
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      text-decoration: none;
    }

    label.btn-visto {
      display: inline-block;
      background: #e5e7eb;
      color: #374151;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
    }
    label.btn-visto::before { content: "Já vi"; }

    label.btn-quente {
      display: inline-block;
      background: #fee2e2;
      color: #dc2626;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
    }
    label.btn-quente::before { content: "🔥 Quente"; }

    .fonte {
      font-size: 0.7rem;
      color: #9ca3af;
      margin-left: auto;
    }

    .varrida-header {
      font-size: 0.78rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 10px 4px 6px;
      border-top: 3px solid #111;
      margin-top: 8px;
      margin-bottom: 10px;
    }
    .varrida-header:first-child {
      border-top: none;
      margin-top: 0;
    }

    .msg-box {
      padding: 10px 14px 12px;
      background: #eff6ff;
      border-top: 1px solid #bfdbfe;
    }
    .msg-label {
      display: block;
      font-size: 0.72rem;
      color: #2563eb;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .msg-text {
      width: 100%;
      font-size: 0.85rem;
      color: #1e3a5f;
      background: white;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 8px;
      resize: none;
      font-family: inherit;
      line-height: 1.4;
    }

    .data-atualizacao {
      text-align: center;
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 24px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>🎮 Garimpo de Videogames</h1>
  <p>Sorocaba · Votorantim · Araçoiaba — só particular, PS2 ao PS5 e Xbox</p>
</header>

<div class="aviso">
  💡 Toque em <strong>Já vi</strong> para riscar um anúncio, ou em <strong>🔥 Quente</strong> para destacar os que valem a pena.
</div>

<!-- ===================== ANÚNCIOS ===================== -->

<p class="data-atualizacao">Atualizado em 12/07/2026 às 21:34 · 0 anúncios · varredura a cada hora</p>

<script>
// Restaurar estado salvo
document.querySelectorAll('input.cb-visto, input.cb-quente').forEach(function(cb) {
  if (localStorage.getItem(cb.id) === '1') cb.checked = true;
});

// Salvar estado ao mudar
document.addEventListener('change', function(e) {
  if (e.target.matches('input.cb-visto, input.cb-quente')) {
    localStorage.setItem(e.target.id, e.target.checked ? '1' : '0');
  }
});

// Copiar mensagem ao clicar na textarea
document.addEventListener('click', function(e) {
  var ta = e.target.closest('.msg-text');
  if (!ta) return;
  var label = ta.previousElementSibling;
  var texto = ta.value;
  function ok() {
    if (label) {
      label.textContent = '✅ Copiado! Agora cole no chat do Facebook.';
      setTimeout(function() { label.textContent = '💬 Toque para copiar a mensagem:'; }, 3000);
    }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(texto).then(ok).catch(function() {
      ta.select();
      document.execCommand('copy');
      ok();
    });
  } else {
    ta.select();
    document.execCommand('copy');
    ok();
  }
});
</script>
</body>
</html>
